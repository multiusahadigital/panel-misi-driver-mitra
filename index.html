<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Kelola Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold">Admin Panel - Kelola Status</h1>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="p-4 border-b border-gray-200 flex flex-col md:flex-row justify-between items-center bg-gray-50 gap-4">
                <h2 class="text-lg font-semibold text-gray-700">Daftar Pengguna</h2>
                
                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                        <input type="text" id="searchInput" placeholder="Cari nama / kode..." 
                            class="pl-9 pr-4 py-1.5 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm w-full sm:w-64">
                    </div>

                    <button onclick="fetchData()" id="btnRefresh" class="text-sm bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1.5 rounded transition flex items-center justify-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        Refresh Data
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-sm uppercase tracking-wider border-b">
                            <th class="p-4 whitespace-nowrap">Baris Sheet</th>
                            <th class="p-4 whitespace-nowrap">Kode</th>
                            <th class="p-4 whitespace-nowrap">Nama</th>
                            <th class="p-4 whitespace-nowrap">Tipe Akun</th>
                            <th class="p-4 text-center whitespace-nowrap">Status Saat Ini</th>
                            <th class="p-4 text-center whitespace-nowrap">Aksi (Ubah Status)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-200">
                        <tr>
                            <td colspan="6" class="p-8 text-center text-blue-500 font-semibold animate-pulse">
                                Memuat data dari server...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ====================================================================
        // PENTING: MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI BAWAH INI
        // ====================================================================
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzHHG3uv6z8Erl9jo96WIQ6QucSZVPERsg0VutXagA9Cv4GWfDZv-x3gXSJDsgWJW2v/exec"; 
        // Contoh: "https://script.google.com/macros/s/AKfycb.../exec"

        let allUsersData = [];

        document.addEventListener('DOMContentLoaded', () => {
            if (GAS_API_URL === "MASUKKAN_URL_WEB_APP_ANDA_DISINI") {
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500 font-semibold">Error: URL API belum diatur di dalam kode HTML.</td></tr>`;
                Swal.fire('Konfigurasi Diperlukan', 'Harap masukkan URL Web App Google Apps Script ke dalam variabel GAS_API_URL di source code.', 'warning');
                return;
            }
            fetchData();
        });

        // Fitur Pencarian
        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') e.preventDefault(); 
        });

        searchInput.addEventListener('keyup', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filteredData = allUsersData.filter(item => {
                const nama = String(item.name || item.Nama || item.nama || "").toLowerCase();
                const kode = String(item.code || item.Kode || item.kode || "").toLowerCase();
                return nama.includes(keyword) || kode.includes(keyword);
            });
            renderTable(filteredData);
        });

        // Mengambil data
        async function fetchData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-blue-500 font-semibold animate-pulse">Memuat data terbaru...</td></tr>`;

            try {
                // Menggunakan fetch biasa untuk mengambil data GET
                const response = await fetch(`${GAS_API_URL}?action=get_all_users_admin`);
                const result = await response.json();

                if (result.status === 'success') {
                    allUsersData = result.data.sort((a, b) => b.row - a.row);
                    document.getElementById('searchInput').value = '';
                    renderTable(allUsersData);
                } else {
                    Swal.fire('Gagal', result.error || 'Gagal mengambil data', 'error');
                    tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500">Terjadi kesalahan: ${result.error}</td></tr>`;
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'Gagal terhubung ke server Google Script.', 'error');
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500">Gagal memuat data. Periksa konsol browser.</td></tr>`;
            }
        }

        // Menampilkan data ke tabel
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-gray-500">Tidak ada data yang ditemukan.</td></tr>`;
                return;
            }

            data.forEach(item => {
                let actionButtons = '-';
                let statusBadge = '';
                
                let rawName = item.name || item.Nama || item.nama || "";
                let displayCode = item.code || item.Kode || item.kode || "-";
                let safeName = String(rawName).split("|||")[0].replace(/'/g, "\\'");
                let displayName = String(rawName).split("|||")[0];

                if (item.status === 1) {
                    statusBadge = `<span class="bg-gray-100 text-gray-700 border border-gray-300 px-3 py-1 rounded-full text-xs font-bold">Driver Reguler (1)</span>`;
                } else if (item.status === 2) {
                    statusBadge = `<span class="bg-blue-100 text-blue-700 border border-blue-300 px-3 py-1 rounded-full text-xs font-bold">Driver Prioritas (2)</span>`;
                } else if (item.status === 3) {
                    statusBadge = `<span class="bg-gray-100 text-gray-700 border border-gray-300 px-3 py-1 rounded-full text-xs font-bold">Mitra Reguler (3)</span>`;
                } else if (item.status === 4) {
                    statusBadge = `<span class="bg-green-100 text-green-700 border border-green-300 px-3 py-1 rounded-full text-xs font-bold">Mitra Prioritas (4)</span>`;
                } else {
                    statusBadge = `<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold">Status ${item.status}</span>`;
                }

                if (item.status === 1) {
                    actionButtons = `<button onclick="updateStatus(${item.row}, 2, '${safeName}', 'Prioritas')" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded text-sm font-medium transition shadow-sm w-full md:w-auto">Naikkan ke Prioritas (2)</button>`;
                } else if (item.status === 2) {
                    actionButtons = `<button onclick="updateStatus(${item.row}, 1, '${safeName}', 'Reguler')" class="bg-orange-500 hover:bg-orange-600 text-white px-3 py-1.5 rounded text-sm font-medium transition shadow-sm w-full md:w-auto">Turunkan ke Reguler (1)</button>`;
                } else if (item.status === 3) {
                    actionButtons = `<button onclick="updateStatus(${item.row}, 4, '${safeName}', 'Prioritas')" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1.5 rounded text-sm font-medium transition shadow-sm w-full md:w-auto">Naikkan ke Prioritas (4)</button>`;
                } else if (item.status === 4) {
                    actionButtons = `<button onclick="updateStatus(${item.row}, 3, '${safeName}', 'Reguler')" class="bg-orange-500 hover:bg-orange-600 text-white px-3 py-1.5 rounded text-sm font-medium transition shadow-sm w-full md:w-auto">Turunkan ke Reguler (3)</button>`;
                }

                let roleName = item.role === "DRIVER_DAFTAR" ? "Driver" : "Mitra";

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition border-b";
                tr.innerHTML = `
                    <td class="p-4 text-gray-500 text-sm whitespace-nowrap">Baris ${item.row}</td>
                    <td class="p-4 font-semibold text-gray-800 whitespace-nowrap">${displayCode}</td>
                    <td class="p-4 text-gray-700 whitespace-nowrap">${displayName}</td>
                    <td class="p-4 text-gray-600 whitespace-nowrap">${roleName}</td>
                    <td class="p-4 text-center whitespace-nowrap">${statusBadge}</td>
                    <td class="p-4 text-center whitespace-nowrap">${actionButtons}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Mengubah Status (menggunakan fetch GET ke endpoint Google Script)
        function updateStatus(row, newStatus, name, statusLevel) {
            Swal.fire({
                title: 'Konfirmasi Perubahan',
                html: `Anda akan mengubah status <b>${name}</b> menjadi <br><b class="text-lg">Status ${newStatus} (${statusLevel})</b>.<br><br>Lanjutkan?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Ya, Ubah Status!',
                cancelButtonText: 'Batal'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: 'Memproses...',
                        text: 'Menyimpan data ke Google Sheet',
                        allowOutsideClick: false,
                        didOpen: () => { Swal.showLoading() }
                    });

                    try {
                        const response = await fetch(`${GAS_API_URL}?action=update_status&row=${row}&new_status=${newStatus}`);
                        const data = await response.json();

                        if (data.status === 'success') {
                            Swal.fire('Berhasil!', `Status berhasil diperbarui.`, 'success');
                            fetchData(); 
                        } else {
                            Swal.fire('Gagal', data.error || 'Terjadi kesalahan pada server.', 'error');
                        }
                    } catch (error) {
                        Swal.fire('Error', 'Gagal menghubungi server.', 'error');
                    }
                }
            })
        }
    </script>
</body>
</html>
